<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ACTOC — Access Through Opportunity & Care</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --teal:       #1a6e7e;
      --teal-dark:  #0d3d47;
      --teal-deep:  #071f26;
      --orange:     #e85d1a;
      --orange-lt:  #f47c35;
      --gold:       #f0a500;
      --cyan:       #5bc8d8;
      --cyan-lt:    #a0e4ef;
      --steel:      #4a7fa5;
      --red-acc:    #c94040;
      --white:      #f0f4f6;
      --off-white:  #d4e5ea;
    }
 
    html { scroll-behavior: smooth; }
 
    body {
      background: var(--teal-deep);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }
 
    /* ── CANVAS PARTICLES ── */
    #particles-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }
 
    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 3rem;
      background: rgba(7,31,38,.75);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(91,200,216,.12);
      transition: background .3s;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: .75rem;
      text-decoration: none;
    }
    .nav-logo img {
      width: 40px;
      height: 40px;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(91,200,216,.5));
    }
    .nav-logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      color: var(--cyan);
      letter-spacing: .04em;
    }
    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }
    .nav-links a {
      color: var(--off-white);
      text-decoration: none;
      font-size: .9rem;
      font-weight: 400;
      letter-spacing: .06em;
      text-transform: uppercase;
      position: relative;
      transition: color .3s;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0;
      width: 0; height: 2px;
      background: var(--orange);
      transition: width .3s;
    }
    .nav-links a:hover { color: var(--cyan); }
    .nav-links a:hover::after { width: 100%; }
    .nav-cta {
      background: var(--orange);
      color: #fff !important;
      padding: .5rem 1.4rem;
      border-radius: 40px;
      font-weight: 500 !important;
    }
    .nav-cta::after { display: none !important; }
    .nav-cta:hover { background: var(--orange-lt) !important; color: #fff !important; }
 
    /* ── HERO ── */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 1;
    }
    .hero-bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(91,200,216,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,200,216,.06) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    }
    .hero-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .glow-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(26,110,126,.45) 0%, transparent 70%);
      top: -100px; left: -100px;
      animation: floatGlow 8s ease-in-out infinite;
    }
    .
